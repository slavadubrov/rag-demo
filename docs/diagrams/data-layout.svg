<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500" font-family="Iowan Old Style, Georgia, serif" font-size="14">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #17212b; stroke-width: 1.4; rx: 8; ry: 8; }
      .label { font-weight: 700; fill: #17212b; }
      .sub { font-size: 12px; fill: #4b5563; }
      .path { font-family: ui-monospace, monospace; font-size: 13px; fill: #17212b; }
      .row-a { fill: #eef4f3; }
      .row-b { fill: #fffaf1; }
      .row-c { fill: #f1f1ee; }
    </style>
  </defs>
  <rect width="1100" height="500" fill="#f7f4ec"/>
  <text x="40" y="38" font-size="22" class="label">On-disk layout — what lives where</text>
  <text x="40" y="60" class="sub">All paths resolve through config.py; DATA_DIR is created on import.</text>

  <rect x="40" y="90" width="1020" height="380" class="box" fill="#fff"/>

  <!-- headers -->
  <rect x="40" y="90" width="1020" height="36" class="row-a"/>
  <text x="60"  y="114" class="label">Path</text>
  <text x="360" y="114" class="label">Source</text>
  <text x="620" y="114" class="label">Purpose</text>
  <text x="900" y="114" class="label">Safe to delete?</text>

  <!-- rows -->
  <g>
    <rect x="40" y="126" width="1020" height="34" class="row-b"/>
    <text x="60"  y="148" class="path">corpus/*.pdf</text>
    <text x="360" y="148" class="sub">download_corpus() or manual</text>
    <text x="620" y="148" class="sub">Source PDFs (10-doc curated manifest)</text>
    <text x="900" y="148" class="sub">yes — re-download anytime</text>
  </g>
  <g>
    <rect x="40" y="160" width="1020" height="34" class="row-c"/>
    <text x="60"  y="182" class="path">corpus/uploads/*.pdf</text>
    <text x="360" y="182" class="sub">Gradio UI upload</text>
    <text x="620" y="182" class="sub">Ad-hoc PDFs ingested in-UI</text>
    <text x="900" y="182" class="sub">yes — re-upload to restore</text>
  </g>
  <g>
    <rect x="40" y="194" width="1020" height="34" class="row-b"/>
    <text x="60"  y="216" class="path">data/pages/&lt;doc_id&gt;/page_NNNN.png</text>
    <text x="360" y="216" class="sub">PyMuPDF _render_pages()</text>
    <text x="620" y="216" class="sub">Full-page renders for UI preview + LLM fallback</text>
    <text x="900" y="216" class="sub">yes — rebuild via rebuild</text>
  </g>
  <g>
    <rect x="40" y="228" width="1020" height="34" class="row-c"/>
    <text x="60"  y="250" class="path">data/crops/&lt;doc_id&gt;/figure_NNNNN.png</text>
    <text x="360" y="250" class="sub">Docling pil_image.save</text>
    <text x="620" y="250" class="sub">Cropped figure/table images for vision model</text>
    <text x="900" y="250" class="sub">yes — rebuild</text>
  </g>
  <g>
    <rect x="40" y="262" width="1020" height="34" class="row-b"/>
    <text x="60"  y="284" class="path">data/docling/&lt;doc_id&gt;.json</text>
    <text x="360" y="284" class="sub">DoclingDocument.export_to_dict</text>
    <text x="620" y="284" class="sub">Parsed layout; lets chunker re-run without reparse</text>
    <text x="900" y="284" class="sub">yes — rebuild</text>
  </g>
  <g>
    <rect x="40" y="296" width="1020" height="34" class="row-c"/>
    <text x="60"  y="318" class="path">data/chunks/&lt;doc_id&gt;.jsonl</text>
    <text x="360" y="318" class="sub">save_chunks()</text>
    <text x="620" y="318" class="sub">Typed retrieval units (one JSON per line)</text>
    <text x="900" y="318" class="sub">yes — rebuild</text>
  </g>
  <g>
    <rect x="40" y="330" width="1020" height="34" class="row-b"/>
    <text x="60"  y="352" class="path">data/qdrant/</text>
    <text x="360" y="352" class="sub">Qdrant local storage</text>
    <text x="620" y="352" class="sub">multimodal_chunks + baseline_chunks (parallel)</text>
    <text x="900" y="352" class="sub">yes — rebuild (be careful)</text>
  </g>
  <g>
    <rect x="40" y="364" width="1020" height="34" class="row-c"/>
    <text x="60"  y="386" class="path">data/manifest.json</text>
    <text x="360" y="386" class="sub">ingest_corpus() / ingest_single_pdf()</text>
    <text x="620" y="386" class="sub">doc_id → (title, pdf_path, pages, chunk_count)</text>
    <text x="900" y="386" class="sub">yes — rebuild</text>
  </g>
  <g>
    <rect x="40" y="398" width="1020" height="34" class="row-b"/>
    <text x="60"  y="420" class="path">data/eval/eval.{md,json}</text>
    <text x="360" y="420" class="sub">run_eval() + write_reports()</text>
    <text x="620" y="420" class="sub">Latest evaluation report</text>
    <text x="900" y="420" class="sub">yes — re-run eval</text>
  </g>
  <g>
    <rect x="40" y="432" width="1020" height="34" class="row-c"/>
    <text x="60"  y="454" class="path">files/corpus_manifest.json</text>
    <text x="360" y="454" class="sub">checked in with the repo</text>
    <text x="620" y="454" class="sub">Curated PDFs + benchmark questions</text>
    <text x="900" y="454" class="sub">NO — authoritative input</text>
  </g>
</svg>
