<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" font-family="Iowan Old Style, Georgia, serif" font-size="14">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#17212b"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f4ec"/>
      <stop offset="100%" stop-color="#efe7d3"/>
    </linearGradient>
    <style>
      .box { fill: #ffffff; stroke: #17212b; stroke-width: 1.5; rx: 10; ry: 10; }
      .accent-teal { fill: #0f766e; }
      .accent-amber { fill: #d97706; }
      .label { font-weight: 700; fill: #17212b; }
      .sub { font-size: 12px; fill: #4b5563; }
      .arrow { stroke: #17212b; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 5 4; }
      .group { fill: rgba(15,118,110,0.06); stroke: rgba(15,118,110,0.3); stroke-dasharray: 4 3; rx: 14; ry: 14; }
      .group-amber { fill: rgba(217,119,6,0.07); stroke: rgba(217,119,6,0.35); stroke-dasharray: 4 3; rx: 14; ry: 14; }
    </style>
  </defs>

  <rect width="1100" height="560" fill="url(#bgGrad)"/>
  <text x="40" y="40" font-size="22" class="label">Unified Multimodal PDF RAG — System Overview</text>
  <text x="40" y="62" class="sub">Docling ingestion → typed Qdrant index → intent-routed retrieval → vision-capable answer with real streaming</text>

  <!-- Ingestion group -->
  <rect x="30" y="90" width="330" height="210" class="group"/>
  <text x="50" y="115" class="label" fill="#0f766e">① Ingestion (offline, one-off)</text>

  <rect x="50" y="130" width="130" height="50" class="box"/>
  <text x="115" y="150" text-anchor="middle" class="label">PDFs</text>
  <text x="115" y="168" text-anchor="middle" class="sub">corpus/ + uploads</text>

  <rect x="210" y="130" width="130" height="50" class="box"/>
  <text x="275" y="150" text-anchor="middle" class="label">Docling</text>
  <text x="275" y="168" text-anchor="middle" class="sub">layout + figures + tables</text>

  <rect x="50" y="210" width="130" height="50" class="box"/>
  <text x="115" y="230" text-anchor="middle" class="label">PyMuPDF</text>
  <text x="115" y="248" text-anchor="middle" class="sub">page PNG renders</text>

  <rect x="210" y="210" width="130" height="50" class="box"/>
  <text x="275" y="230" text-anchor="middle" class="label">Typed Chunker</text>
  <text x="275" y="248" text-anchor="middle" class="sub">section / table / figure</text>

  <path class="arrow" d="M 180 155 L 210 155"/>
  <path class="arrow" d="M 115 180 L 115 210"/>
  <path class="arrow" d="M 275 180 L 275 210"/>
  <path class="arrow" d="M 180 235 L 210 235"/>

  <!-- Index group -->
  <rect x="390" y="90" width="330" height="210" class="group"/>
  <text x="410" y="115" class="label" fill="#0f766e">② Index (local Qdrant)</text>

  <rect x="410" y="140" width="290" height="60" class="box"/>
  <text x="555" y="160" text-anchor="middle" class="label">multimodal_chunks</text>
  <text x="555" y="178" text-anchor="middle" class="sub">typed payloads: element_type, section_path, bbox,</text>
  <text x="555" y="192" text-anchor="middle" class="sub">image_ref, crop_ref, table_markdown/html</text>

  <rect x="410" y="220" width="290" height="60" class="box"/>
  <text x="555" y="240" text-anchor="middle" class="label">baseline_chunks</text>
  <text x="555" y="258" text-anchor="middle" class="sub">naive PyMuPDF page-text chunks — separate collection</text>
  <text x="555" y="272" text-anchor="middle" class="sub">for structurally fair side-by-side comparison</text>

  <path class="arrow" d="M 340 170 L 410 170"/>
  <path class="arrow" d="M 340 250 L 410 250"/>

  <!-- Query group -->
  <rect x="750" y="90" width="320" height="210" class="group-amber"/>
  <text x="770" y="115" class="label" fill="#d97706">③ Query path (online)</text>

  <rect x="770" y="130" width="280" height="40" class="box"/>
  <text x="910" y="155" text-anchor="middle" class="label">Intent router</text>

  <rect x="770" y="180" width="280" height="40" class="box"/>
  <text x="910" y="205" text-anchor="middle" class="label">Layered retrieval + page expansion</text>

  <rect x="770" y="230" width="280" height="50" class="box"/>
  <text x="910" y="250" text-anchor="middle" class="label">Vision answer (streamed)</text>
  <text x="910" y="268" text-anchor="middle" class="sub">GPT-4o-mini · crops preferred · citation check</text>

  <path class="arrow" d="M 910 170 L 910 180"/>
  <path class="arrow" d="M 910 220 L 910 230"/>

  <!-- From index into retrieval -->
  <path class="arrow" d="M 700 170 C 740 170, 740 200, 770 200"/>

  <!-- UI / CLI below -->
  <rect x="30" y="340" width="1040" height="180" class="group"/>
  <text x="50" y="365" class="label" fill="#0f766e">④ Surfaces</text>

  <rect x="50" y="380" width="220" height="120" class="box"/>
  <text x="160" y="405" text-anchor="middle" class="label">Gradio UI</text>
  <text x="160" y="425" text-anchor="middle" class="sub">Tabs: Answer · Evidence ·</text>
  <text x="160" y="442" text-anchor="middle" class="sub">Page preview · Tables ·</text>
  <text x="160" y="459" text-anchor="middle" class="sub">Baseline comparison · Debug</text>
  <text x="160" y="480" text-anchor="middle" class="sub">Upload + in-UI ingest</text>

  <rect x="290" y="380" width="220" height="120" class="box"/>
  <text x="400" y="405" text-anchor="middle" class="label">CLI (rag-demo)</text>
  <text x="400" y="425" text-anchor="middle" class="sub">rebuild · list · query ·</text>
  <text x="400" y="442" text-anchor="middle" class="sub">app · download · eval</text>

  <rect x="530" y="380" width="240" height="120" class="box"/>
  <text x="650" y="405" text-anchor="middle" class="label">Evaluator</text>
  <text x="650" y="425" text-anchor="middle" class="sub">Extraction stats · routing ·</text>
  <text x="650" y="442" text-anchor="middle" class="sub">citation grounding · LLM judge</text>
  <text x="650" y="465" text-anchor="middle" class="sub">→ data/eval/eval.md + .json</text>

  <rect x="790" y="380" width="260" height="120" class="box"/>
  <text x="920" y="405" text-anchor="middle" class="label">Offline safety net</text>
  <text x="920" y="425" text-anchor="middle" class="sub">Hash embeddings + stub answer</text>
  <text x="920" y="442" text-anchor="middle" class="sub">when OPENAI_API_KEY unset</text>
  <text x="920" y="465" text-anchor="middle" class="sub">Pytest suite runs fully offline</text>

  <!-- Connectors: surfaces to query -->
  <path class="arrow dash" d="M 160 380 C 160 330, 700 330, 840 290"/>
  <path class="arrow dash" d="M 400 380 C 400 330, 820 330, 870 290"/>
  <path class="arrow dash" d="M 650 380 C 650 330, 900 330, 900 290"/>
</svg>
